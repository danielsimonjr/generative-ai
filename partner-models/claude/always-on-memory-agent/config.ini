; Always On Memory Agent configuration
;
; This file is the canonical source for the paths below — there are no
; built-in defaults. Precedence when a setting is given in more than one
; place:
;   CLI flag  >  environment variable  >  this file
;
; The file is read from the directory the agent is started in; point the
; MEMORY_CONFIG environment variable at a different path if needed.

[memory]
; Path to the SQLite database file (env: MEMORY_DB)
db = memory.db

; Folder to watch for new files (env: MEMORY_INBOX, flag: --watch)
inbox = ./inbox
