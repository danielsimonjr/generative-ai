; Always On Memory Agent configuration
;
; This file is the canonical source for the paths below — there are no
; built-in defaults. Precedence when a setting is given in more than one
; place:
;   CLI flag  >  environment variable  >  this file
;
; The file is read from the directory the agent is started in; point the
; MEMORY_CONFIG environment variable at a different path if needed.

[memory]
; Path to the SQLite database file (env: MEMORY_DB)
db = memory.db

; Folder to watch for new files (env: MEMORY_INBOX, flag: --watch)
inbox = ./inbox

[decay]
; Memory decay: consolidated memories are archived once their
; age-discounted importance falls below the threshold. Effective
; importance halves every half_life_days. Set threshold to 0 to disable.
; (env: MEMORY_DECAY_HALF_LIFE_DAYS, MEMORY_DECAY_THRESHOLD)
;half_life_days = 30
;threshold = 0.15

[server]
; Interface the HTTP API binds to (env: MEMORY_HOST). Default 127.0.0.1 —
; set to 0.0.0.0 to expose on the network (configure a token if you do).
;host = 127.0.0.1

; When set, every API request must send "Authorization: Bearer <token>"
; (env: MEMORY_API_TOKEN)
;token = change-me
